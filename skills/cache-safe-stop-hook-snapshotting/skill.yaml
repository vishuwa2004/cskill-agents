slug: cache-safe-stop-hook-snapshotting
name: Cache-Safe Stop-Hook Snapshotting
summary: Persist a cache-safe stop-hook context snapshot only for main session queries
  so later helpers can resume from stable state without fork pollution.
when_to_use: Apply when end-of-turn hooks need to persist enough state for follow-up
  helpers, but background forks must not overwrite the main session snapshot.
