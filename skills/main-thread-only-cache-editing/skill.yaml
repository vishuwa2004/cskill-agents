slug: main-thread-only-cache-editing
name: Main Thread Only Cache Editing
summary: Gate cached microcompact cache edits to the main thread so background forks
  cannot alter the shared cache state.
when_to_use: Use when cached microcompact runs and you must prevent subagents or forks
  from writing cache edits that the main thread shares.
