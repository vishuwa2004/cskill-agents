slug: skip-skill-discovery-on-skill-expansion
name: Skip Skill Discovery on Skill Expansion
summary: Bypass skill discovery when expanded SKILL.md or generated prompt content
  is being reprocessed for attachments, so non-user text does not trigger recursive
  discovery work.
when_to_use: Apply when generated or expanded skill text must pass through the attachment
  pipeline for parsing, but it is not fresh user intent and must not trigger discovery
  queries.
