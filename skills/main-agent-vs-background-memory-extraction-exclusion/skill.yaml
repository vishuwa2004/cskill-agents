slug: main-agent-vs-background-memory-extraction-exclusion
name: Main Agent Vs Background Memory Extraction Exclusion
summary: Skip the background memory extractor when the main agent already persisted
  memory during the same turn to avoid duplicates and race hazards.
when_to_use: Apply whenever the background memory agent must determine whether the
  parent already saved the same memories so it can safely skip processing.
