slug: compact-boundary-session-distillation
name: Compact Boundary Session Distillation
summary: Distill the compact boundary delta into the session memory summary and the
  freshest user cues needed for skill capture prompts.
when_to_use: When skillify captures a repeating process, use the latest session memory
  and the user messages after the most recent compact boundary so the prompt only
  contains the current instructions.
