slug: skip-skill-listing-without-skill-tool
name: Skip Skill Listing Without Skill Tool
summary: Omit skill-listing attachments for agents that do not expose the Skill tool,
  so discoverability context is only sent where it can be acted on.
when_to_use: Apply when an attachment or context injector is about to advertise capabilities
  to an agent that may not have the tool needed to use them.
