slug: empty-repo-bundle-preflight
name: Empty Repo Bundle Preflight
summary: Fail fast when the repository has no refs so downstream bundling never triggers
  empty Git bundles.
when_to_use: Apply before running `git bundle create` to ensure the repository actually
  has refs, avoiding the 128 exit code and providing a clearer error path.
