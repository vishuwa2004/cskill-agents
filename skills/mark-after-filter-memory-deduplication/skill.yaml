slug: mark-after-filter-memory-deduplication
name: Mark-After-Filter Memory Deduplication
summary: Filter prefetched memory attachments against cumulative read state before
  mutating that state, so async surfacing does not dedupe itself away.
when_to_use: Apply when asynchronously prefetched memories or file attachments must
  be deduplicated against a cumulative read-state cache that they will also update
  after surviving the filter.
