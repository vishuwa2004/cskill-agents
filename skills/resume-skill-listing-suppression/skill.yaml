slug: resume-skill-listing-suppression
name: Resume Skill Listing Suppression
summary: Mark the current skill listing as already sent when resuming so the transcript
  does not receive a redundant payload.
when_to_use: Apply when a resume flow already contains a previous `skill_listing`
  attachment and injecting another would waste ~600 tokens.
