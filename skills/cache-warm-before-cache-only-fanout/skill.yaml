slug: cache-warm-before-cache-only-fanout
name: Cache Warm Before Cache-Only Fanout
summary: Warm the authoritative cache path first, then fan out cache-only readers
  in parallel so derived loaders never race stale state.
when_to_use: Apply when one authoritative load populates caches that several cheaper
  readers depend on, and parallel reads would race the warm path.
