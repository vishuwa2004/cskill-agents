slug: atomic-post-await-state-commit
name: Atomic Post-Await State Commit
summary: After awaiting persistence work, update the shared budget state for each
  `tool_use_id` exactly once so no concurrent reader ever sees a half-committed decision.
when_to_use: Use this pattern when concurrently persisting large tool results and
  mutating `ContentReplacementState` once the awaited work completes, such as the
  `freshReplacements` loop inside `enforceToolResultBudget`.
