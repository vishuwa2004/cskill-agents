slug: empty-payload-sentinel-guard
name: Empty Payload Sentinel Guard
summary: Guard requests from closing instantly when a tool returns nothing by injecting
  the sentinel message and logging the event.
when_to_use: 'Apply this when a tool_result block might legitimately be empty (shell
  commands with no stdout, MCP commands returning `content: []`, statements that finish
  silently) so the assistant still sees something to react to.'
category: tool-orchestration
maturity: recommended
