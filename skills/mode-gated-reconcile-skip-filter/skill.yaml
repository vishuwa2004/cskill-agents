slug: mode-gated-reconcile-skip-filter
name: Mode-Gated Reconcile Skip Filter
summary: Inject mode-specific skip rules into a shared reconciler so unsupported source
  types are recorded and skipped without forking the core install logic.
when_to_use: Apply when a shared reconcile engine runs in multiple runtime modes,
  but some modes cannot support every source type or transport.
